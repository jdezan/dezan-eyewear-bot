services:
  # API + WhatsApp webhook
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./vectorstore:/app/vectorstore
    restart: unless-stopped

  # Bot Telegram (separado — polling, nao precisa de porta)
  telegram:
    build: .
    command: python bot_telegram.py
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./vectorstore:/app/vectorstore
    restart: unless-stopped
